name: Build APK & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      KEYSTORE_FILE: release-keystore.jks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Pull LFS objects
        run: |
          git lfs pull
          git lfs checkout
          ls -lh app/src/main/assets/ || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/$KEYSTORE_FILE

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK (Signed)
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Get next version tag
        id: version
        shell: bash
        run: |
          git fetch --tags --force

          LATEST_TAG=$(git tag -l "v[0-9]*.0.0" --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            NEXT_TAG="v1.0.0"
          else
            CURRENT_MAJOR=$(echo "$LATEST_TAG" | sed -E 's/^v([0-9]+)\.0\.0$/\1/')
            NEXT_MAJOR=$((CURRENT_MAJOR + 1))
            NEXT_TAG="v${NEXT_MAJOR}.0.0"
          fi

          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "next_tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "${{ steps.version.outputs.next_tag }}"
          git push origin "${{ steps.version.outputs.next_tag }}"

      - name: Create GitHub Release and upload APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.next_tag }}" \
            app/build/outputs/apk/release/app-release.apk \
            --title "${{ steps.version.outputs.next_tag }}" \
            --notes "Release otomatis untuk ${{ steps.version.outputs.next_tag }}"
